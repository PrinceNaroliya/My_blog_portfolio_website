<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Blog{% endblock %}</title>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
</head>
<body class="{% block body_class %}{% endblock %}">
    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="nav-left">
                <a href="/" class="logo">MyBlog</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/about">About</a></li>
                    <li><a href="/blog_page">Blog</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <input type="text" placeholder="Search..." class="search-bar">
                <a href="/profile" class="btn"><i class="fa-solid fa-user"></i> Profile</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-container">
            <p>&copy; 2025 MyBlog. All rights reserved.</p>
            <div class="socials">
                <a class="footer_social_icons" href="#"><i class="fab fa-facebook-f"></i> Facebook</a>
                <a class="footer_social_icons" href="#"><i class="fab fa-twitter"></i> Facebook</a>
                <a class="footer_social_icons" href="#"><i class="fab fa-instagram"></i> Facebook</a>
            </div>
        </div>
    </footer>
</body>
</html>
